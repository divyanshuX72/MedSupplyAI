<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MedicineSupply.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body
    class="bg-[#0f172a] text-white font-['Inter'] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Glows -->
    <div
        class="absolute top-0 right-0 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none animate-float">
    </div>
    <div
        class="absolute bottom-0 left-0 w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none animate-float-delayed">
    </div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 pointer-events-none">
    </div>

    <div class="w-full max-w-md relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-cyan-500 shadow-lg shadow-purple-500/30 mb-6 transform hover:scale-105 transition-transform duration-300">
                <i data-lucide="user-plus" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Create
                Account</h1>
            <p class="text-slate-400 mt-2 text-sm">Join the future of hospital inventory management</p>
        </div>

        <div class="glass-panel-premium p-8 rounded-3xl">
            <form id="signup-form">
                <div class="space-y-4">
                    <!-- Full Name -->
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Full
                            Name</label>
                        <div class="relative group">
                            <i data-lucide="user"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="text" id="name" required placeholder="John Doe"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                    </div>

                    <!-- Hospital Name -->
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Hospital
                            Name</label>
                        <div class="relative group">
                            <i data-lucide="building-2"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="text" id="hospital_name" required placeholder="General Hospital"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email
                            Address</label>
                        <div class="relative group">
                            <i data-lucide="mail"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="email" id="email" required placeholder="admin@hospital.com"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                        <div class="relative group">
                            <i data-lucide="lock"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="password" id="password" required placeholder="••••••••"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                    </div>

                    <!-- Role Selection -->
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Role</label>
                        <div class="relative group">
                            <i data-lucide="shield"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <select id="role"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300 appearance-none cursor-pointer">
                                <option value="user" class="bg-slate-900">Staff / User</option>
                                <option value="pharmacist" class="bg-slate-900">Pharmacist</option>
                                <option value="admin" class="bg-slate-900">Administrator</option>
                            </select>
                            <i data-lucide="chevron-down"
                                class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none"></i>
                        </div>
                    </div>

                    <div id="error-msg"
                        class="text-red-400 text-sm hidden bg-red-500/10 p-3 rounded-xl border border-red-500/20 text-center animate-bounce">
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full py-4 rounded-xl bg-gradient-to-r from-purple-600 via-violet-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 text-white font-bold shadow-lg shadow-purple-500/20 transition-all duration-300 transform hover:scale-[1.02] mt-4 flex items-center justify-center gap-2 group border border-white/10">
                        <span>Create Account</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </form>

            <script>
                document.getElementById('signup-form').addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const btn = document.getElementById('submit-btn');
                    const errorMsg = document.getElementById('error-msg');

                    // Clear errors
                    errorMsg.classList.add('hidden');
                    errorMsg.textContent = '';

                    // Loading State
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';
                    btn.disabled = true;

                    const formData = {
                        name: document.getElementById('name').value,
                        hospital_name: document.getElementById('hospital_name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        role: document.getElementById('role').value
                    };

                    try {
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(formData)
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // Success
                            btn.innerHTML = 'Success!';
                            btn.classList.replace('from-purple-600', 'from-emerald-600');
                            btn.classList.replace('to-cyan-600', 'to-emerald-500');

                            setTimeout(() => {
                                window.location.href = '/login?registered=true';
                            }, 1000);
                        } else {
                            throw new Error(data.error || 'Registration failed');
                        }

                    } catch (err) {
                        console.error(err);
                        errorMsg.textContent = err.message;
                        errorMsg.classList.remove('hidden');

                        // Reset button
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                });
            </script>

            <div class="mt-6 text-center text-sm text-slate-400">
                Already have an account?
                <a href="/login" class="text-cyan-400 font-medium hover:text-cyan-300">Log in</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
