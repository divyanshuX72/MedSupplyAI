<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedicineSupply.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body
    class="bg-[#0f172a] text-white font-['Inter'] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Glows -->
    <div
        class="absolute top-0 left-0 w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none animate-float">
    </div>
    <div
        class="absolute bottom-0 right-0 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none animate-float-delayed">
    </div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 pointer-events-none">
    </div>

    <div class="w-full max-w-md relative z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg shadow-cyan-500/30 mb-6 transform hover:scale-105 transition-transform duration-300">
                <i data-lucide="activity" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                Welcome Back</h1>
            <p class="text-slate-400 mt-2 text-sm">Sign in to access your dashboard</p>
        </div>

        <div class="glass-panel-premium p-8 rounded-3xl">
            <form id="loginForm">
                <div class="space-y-5">
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email
                            Address</label>
                        <div class="relative group">
                            <i data-lucide="mail"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="email" id="email" required placeholder="admin@hospital.com"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                    </div>

                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                        <div class="relative group">
                            <i data-lucide="lock"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                            <input type="password" id="password" required placeholder="••••••••"
                                class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300">
                        </div>
                        <div class="flex justify-end mt-2">
                            <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Forgot
                                password?</a>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold shadow-lg shadow-cyan-500/20 transition-all duration-300 transform hover:scale-[1.02] mt-4 flex items-center justify-center gap-2 group border border-white/10">
                        <span>Sign In</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                    <p id="errorMessage" class="text-red-500 text-sm text-center hidden"></p>
                </div>
            </form>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const errorElem = document.getElementById('errorMessage');

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // Store token
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user)); // stored for legacy use

                            // Redirect based on role
                            if (data.user && data.user.role === 'admin') {
                                window.location.href = '/admin.html'; // Explicitly go to admin HTML
                            } else {
                                window.location.href = '/dashboard';
                            }
                        } else {
                            errorElem.textContent = data.error || 'Login failed';
                            errorElem.classList.remove('hidden');
                        }
                    } catch (err) {
                        errorElem.textContent = 'Connection error. Please try again.';
                        errorElem.classList.remove('hidden');
                    }
                });
            </script>

            <div class="mt-6 text-center text-sm text-slate-400">
                Don't have an account?
                <a href="/signup" class="text-cyan-400 font-medium hover:text-cyan-300">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
